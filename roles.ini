
# Roles configuration for vim-ai
# Save this file to ~/.vim/roles.ini

[grammar]
prompt = fix spelling and grammar
options.temperature = 0.4

[refactor]
prompt = You are a Clean Code expert. Please refactor this code to be more clean and concise. Explain the benefits of your changes.

[doc]
prompt = Add clear documentation to this code following best practices.

[optimize]
prompt = Optimize this code for performance while maintaining readability.

[explain]
prompt = Explain how this code works in simple terms.

[debug]
prompt = Identify potential bugs or issues in this code and suggest fixes.

[test]
prompt = Generate comprehensive test cases for this code.

[c]
prompt = You are a C programming expert. Help me write clean, efficient C code following the Linux kernel style guide.

[python]
prompt = You are a Python expert. Help me write Pythonic code following PEP 8 guidelines.

[bash]
prompt = You are a shell scripting expert. Help me write robust and efficient Bash scripts.
